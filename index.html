<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerador de PDF</title>
<link rel="stylesheet" href="./src/style/index.css">
</head>

<body>

<div class="container">
  <h2>Gerador de Documento</h2>

  <input id="cliente" placeholder="Cliente">
  <input id="sistema" placeholder="Sistema">
  <input id="modulo" placeholder="Módulo">
  <input id="projeto" placeholder="Projeto">
  <input id="documento" placeholder="Documento referêncial">
  <input id="autor" placeholder="Autor">
  <input id="data" placeholder="Data">

  <textarea id="conclusao" placeholder="Conclusão"></textarea>

  <input type="file" id="imagem">

  <button onclick="gerar()">Gerar PDF</button>
</div>

<script src="./src/script/script.js"></script>
</body>
</html>
